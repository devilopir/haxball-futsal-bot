services:
  postgres:
    image: postgres:16-alpine
    container_name: futsal-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=haxball
      - POSTGRES_USER=haxball
      - POSTGRES_PASSWORD=haxball123
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      botnet:
        ipv4_address: 172.20.0.5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haxball"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot1:
    build: .
    container_name: futsal-bot1
    restart: unless-stopped
    environment:
      - BOT_ID=bot1
      - ROOM_NAME=Futsal Acemi 1
      - DATABASE_URL=postgresql://haxball:haxball123@postgres:5432/haxball
    volumes:
      - ./data/shared:/app/data/shared
      - ./data/tokens:/app/data/tokens
      - ./logs/bot1:/app/logs
      - ./bots.json:/app/bots.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      botnet:
        ipv4_address: 172.20.0.11

  bot2:
